spring:
  application:
    name: scb-campaign-service
  cloud:
    bus:
      enabled: true

campaign:
  enabled: true
  type: HAPPY-PATH
  discount-rate: 22
  response:
    message-prefix: "[CAMPAIGN]"
    include-discount: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,refresh,busrefresh

spring:
  application:
    name: scb-campaign-service
  cloud:
    bus:
      enabled: true

campaign:
  enabled: true
  type: END-OF-YEAR
  discount-rate: 55
  response:
    message-prefix: "[CAMPAIGN]"
    include-discount: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,refresh,busrefresh
